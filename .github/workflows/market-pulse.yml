name: Daily Market Pulse & Update
on:
  schedule:
    # Runs at 16:00 UTC every weekday (Monday-Friday)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Allows manual triggers

permissions:
  contents: write # Needed to push the updated CSV back to the repository

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Spread Scraper
        # This script now reads the CSV, fetches recent BoC data, 
        # and appends only new, unique entries.
        run: python pulse_check.py 

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add docs/historical_spread.csv
          # Only commit if there are actual changes to the file
          git commit -m "data: update historical spread [skip ci]" || echo "No changes to commit"
          git push
