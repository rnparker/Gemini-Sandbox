<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSCU // ZERO-TRUST SDP // NOC</title>
<style>
    :root {
        --bg-color: #050505;
        --text-primary: #00FF41; 
        --text-accent: #00FFFF;  
        --text-alert: #FF003C;   
        
        /* Solid fills to ensure lines hide underneath */
        --node-fill: #050505; 
        --node-stroke: #00FF41;
        
        --font-stack: 'Fira Code', 'Consolas', 'Courier New', monospace;
        --glow: drop-shadow(0 0 6px rgba(0, 255, 65, 0.8));
        --glow-accent: drop-shadow(0 0 10px rgba(0, 255, 255, 0.9));
        --glow-alert: drop-shadow(0 0 10px rgba(255, 0, 60, 1));
    }

    body.light-mode {
        --bg-color: #F0F4F0;
        --text-primary: #004400;
        --text-accent: #005555;
        --text-alert: #880000;
        --node-fill: #F0F4F0; 
        --node-stroke: #006600;
        --glow: none; --glow-accent: none; --glow-alert: none;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        font-family: var(--font-stack);
        margin: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
        transition: background-color 0.3s, color 0.3s;
    }

    /* Matrix Rain */
    #canvas-rain {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        opacity: 0.15;
        pointer-events: none;
        z-index: 1;
    }
    body.light-mode #canvas-rain { opacity: 0.05; }

    /* UI Layout */
    #noc-interface {
        display: flex; flex-direction: column;
        height: 100%; z-index: 2; position: relative;
    }

    header {
        padding: 15px 30px;
        border-bottom: 1px solid var(--node-stroke);
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
    }

    header h1 { margin: 0; font-size: 20px; letter-spacing: 2px; filter: var(--glow); }
    .view-controls { display: flex; gap: 15px; }

    /* SVG Diagram Styling */
    #diagram-container {
        flex: 1; position: relative;
        display: flex; justify-content: center; align-items: center;
    }

    svg { width: 100%; height: 100%; max-width: 1400px; max-height: 900px; }

    /* Labels */
    .node-title { fill: var(--text-primary); font-size: 16px; font-weight: bold; letter-spacing: 2px; filter: var(--glow); }
    .ctrl-label { fill: var(--text-primary); font-size: 10px; pointer-events: none; }

    /* Nodes */
    .node-shape {
        fill: var(--node-fill);
        stroke: var(--node-stroke);
        stroke-width: 2;
        transition: 0.3s;
    }
    
    .node-group { cursor: pointer; filter: var(--glow); transition: 0.2s; }
    .node-group:hover { filter: var(--glow-accent); transform: translateY(-3px); }
    .node-group:hover .node-shape { stroke: var(--text-accent); fill: rgba(0, 255, 255, 0.05); }

    /* Paths */
    .path-primary {
        fill: none;
        stroke: var(--text-accent);
        stroke-width: 3;
        filter: var(--glow-accent);
        transition: 0.3s;
    }

    .path-secondary {
        fill: none;
        stroke: var(--text-primary);
        stroke-width: 2;
        stroke-dasharray: 8, 8;
        filter: var(--glow);
        opacity: 0.6;
        transition: 0.3s;
    }

    /* Animations */
    @keyframes dashFlow { to { stroke-dashoffset: -160; } }
    .anim-on .path-secondary { animation: dashFlow 4s linear infinite; }

    .data-pulse { fill: #FFF; filter: drop-shadow(0 0 8px var(--text-accent)); visibility: hidden; }
    .anim-on .data-pulse { visibility: visible; }

    /* Failure States */
    .link-fail { stroke: var(--text-alert) !important; filter: var(--glow-alert) !important; stroke-dasharray: 4,4 !important; opacity: 0.5; }
    .link-promoted { stroke: var(--text-accent) !important; stroke-width: 3 !important; stroke-dasharray: none !important; filter: var(--glow-accent) !important; opacity: 1 !important; }
    
    .node-fail .node-shape { stroke: var(--text-alert); fill: rgba(255,0,0,0.1); }
    .node-fail .ctrl-label { fill: var(--text-alert); }

    /* Buttons */
    .ui-btn {
        background: rgba(0,0,0,0.8); border: 1px solid var(--node-stroke);
        color: var(--text-primary); font-family: var(--font-stack); font-size: 13px;
        padding: 8px 16px; cursor: pointer; transition: 0.2s; font-weight: bold;
    }
    .ui-btn:hover { background: rgba(0,255,65,0.1); border-color: var(--text-accent); color: var(--text-accent); }
    .ui-btn-danger { border-color: var(--text-alert); color: var(--text-alert); }
    .ui-btn-danger:hover { background: rgba(255,0,60,0.1); color: #fff; box-shadow: 0 0 10px var(--text-alert); }
</style>
</head>
<body class="anim-on dark-mode">

<canvas id="canvas-rain"></canvas>

<div id="noc-interface">
    <header>
        <h1>KSCU // SECURE NETWORK TOPOLOGY</h1>
        <div class="view-controls">
            <button class="ui-btn ui-btn-danger" onclick="triggerFailover()">TEST HA FAILOVER</button>
            <button class="ui-btn active" onclick="toggleAnim(this)">ANIM: ON</button>
            <button class="ui-btn" onclick="toggleTheme(this)">MODE: DARK</button>
        </div>
    </header>

    <div id="diagram-container">
        <svg viewBox="0 0 1000 700">
            <defs>
                <polygon id="ctrl-shape" points="25,0 50,15 50,45 25,60 0,45 0,15" class="node-shape"/>
            </defs>

            <g id="network-paths">
                
                <path id="p-golden-pri" d="M 180 500 Q 330 300 460 150" class="path-primary"/>
                <path id="p-trail-pri" d="M 460 500 L 460 150" class="path-primary"/>
                <path id="p-fruit-pri" d="M 740 500 Q 600 300 460 150" class="path-primary"/>

                <path id="p-golden-sec" d="M 260 500 Q 380 320 540 150" class="path-secondary"/>
                <path id="p-trail-sec" d="M 540 500 L 540 150" class="path-secondary"/>
                <path id="p-fruit-sec" d="M 820 500 Q 680 320 540 150" class="path-secondary"/>
            </g>

            <g id="particles">
                <circle r="4" class="data-pulse">
                    <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#p-golden-pri"/></animateMotion>
                </circle>
                <circle r="4" class="data-pulse">
                    <animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#p-trail-pri"/></animateMotion>
                </circle>
                <circle r="4" class="data-pulse">
                    <animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#p-fruit-pri"/></animateMotion>
                </circle>
            </g>

            <g id="network-nodes">
                
                <text x="500" y="60" text-anchor="middle" class="node-title">AZURE CLOUD</text>
                
                <g class="node-group" id="az-pri" transform="translate(435, 120)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">PRI</text>
                </g>
                <g class="node-group" id="az-sec" transform="translate(515, 120)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">SEC</text>
                </g>

                <g class="node-group" id="gld-pri" transform="translate(155, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">PRI</text>
                </g>
                <g class="node-group" id="gld-sec" transform="translate(235, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">SEC</text>
                </g>
                <text x="220" y="565" text-anchor="middle" class="node-title">GOLDEN</text>

                <g class="node-group" id="trl-pri" transform="translate(435, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">PRI</text>
                </g>
                <g class="node-group" id="trl-sec" transform="translate(515, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">SEC</text>
                </g>
                <text x="500" y="565" text-anchor="middle" class="node-title">TRAIL</text>

                <g class="node-group" id="frt-pri" transform="translate(715, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">PRI</text>
                </g>
                <g class="node-group" id="frt-sec" transform="translate(795, 470)">
                    <use href="#ctrl-shape"/>
                    <text x="25" y="35" text-anchor="middle" class="ctrl-label">SEC</text>
                </g>
                <text x="780" y="565" text-anchor="middle" class="node-title">FRUITVALE</text>

            </g>
        </svg>
    </div>
</div>

<script>
    // Matrix Rain Effect
    const canvas = document.getElementById('canvas-rain');
    const ctx = canvas.getContext('2d');
    let w, h, columns, drops = [];
    const chars = "0101010101<>:-=".split("");

    function initRain() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        columns = Math.floor(w / 14);
        drops = Array(columns).fill(1);
    }

    function drawRain() {
        const isDarkMode = !document.body.classList.contains('light-mode');
        ctx.fillStyle = isDarkMode ? 'rgba(5, 5, 5, 0.05)' : 'rgba(240, 244, 240, 0.05)';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = isDarkMode ? '#00FF41' : '#004400';
        ctx.font = '14px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 14, drops[i] * 14);
            if (drops[i] * 14 > h && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    
    let rainInterval;
    function startRain() {
        clearInterval(rainInterval); initRain();
        rainInterval = setInterval(drawRain, 35);
    }

    // Toggles
    function toggleAnim(btn) {
        document.body.classList.toggle('anim-on');
        btn.textContent = document.body.classList.contains('anim-on') ? 'ANIM: ON' : 'ANIM: OFF';
        btn.classList.toggle('active');
    }

    function toggleTheme(btn) {
        document.body.classList.toggle('light-mode');
        btn.textContent = document.body.classList.contains('light-mode') ? 'MODE: LIGHT' : 'MODE: DARK';
        btn.classList.toggle('active');
    }

    // Failover Simulation
    let isFailed = false;
    function triggerFailover() {
        const priPath = document.getElementById('p-trail-pri');
        const secPath = document.getElementById('p-trail-sec');
        const priNode = document.getElementById('trl-pri');
        const pulse = document.querySelectorAll('.data-pulse')[1]; // Trail's pulse

        if (!isFailed) {
            priPath.classList.add('link-fail');
            priNode.classList.add('node-fail');
            secPath.classList.add('link-promoted');
            pulse.style.visibility = 'hidden'; // Stop primary pulse
            isFailed = true;
        } else {
            priPath.classList.remove('link-fail');
            priNode.classList.remove('node-fail');
            secPath.classList.remove('link-promoted');
            pulse.style.visibility = ''; // Restore primary pulse
            isFailed = false;
        }
    }

    window.onload = startRain;
    window.onresize = initRain;
</script>
</body>
</html>
