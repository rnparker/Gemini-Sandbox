<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KSCU | Appgate Cyber-Resilience Dashboard</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-green: #00ff88;
            --neon-blue: #00d9ff;
            --neon-purple: #bc00ff;
            --neon-red: #ff3c3c;
            --neon-gold: #ffcc00;
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: var(--font);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 10;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .header p {
            margin: 5px 0;
            opacity: 0.6;
            font-size: 14px;
        }

        .dashboard-container {
            position: relative;
            width: 1000px;
            height: 700px;
            background: radial-gradient(circle at center, #161b22 0%, #0b0e14 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* SVG Styles */
        svg { width: 100%; height: 100%; }

        .link-base { stroke: rgba(255,255,255,0.05); stroke-width: 2; fill: none; }
        
        .sdp-tunnel {
            fill: none;
            stroke: var(--neon-green);
            stroke-width: 3;
            stroke-linecap: round;
            filter: url(#glow);
            opacity: 0.8;
            transition: all 0.5s ease;
        }

        .sdp-tunnel.failed { stroke: var(--neon-red); filter: url(#red-glow); stroke-dasharray: 10; }

        /* Data Pulse Animation */
        .pulse {
            fill: var(--neon-green);
            filter: url(#glow);
        }

        .pulse-fast { animation: flow 3s linear infinite; }
        .pulse-med { animation: flow 5s linear infinite; }

        @keyframes flow {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }

        /* Nodes / Glassmorphism */
        .node-rect {
            fill: var(--card-bg);
            stroke: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .node-rect:hover { stroke: var(--neon-blue); }

        /* Labels */
        .label { font-size: 12px; font-weight: bold; fill: white; pointer-events: none; }
        .status { font-size: 10px; fill: var(--neon-green); }

        /* UI Controls */
        .controls {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .btn-chaos { border-color: var(--neon-red); color: var(--neon-red); }
        .btn-chaos:hover { background: var(--neon-red); color: white; box-shadow: 0 0 20px var(--neon-red); }

        #mesh-status {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-left: 4px solid var(--neon-green);
            font-size: 12px;
            width: 200px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KSCU | SECURE OVERLAY ARCHITECTURE</h1>
        <p>CO-MANAGED BY MATRIX IT &amp; KSCU INTERNAL TEAM</p>
    </div>

    <div id="mesh-status">
        <div style="color: var(--neon-green); margin-bottom: 5px;">SYSTEM STATUS: OPTIMAL</div>
        <div id="log-content" style="opacity: 0.7; font-family: monospace; font-size: 10px;">
            > Appgate Controllers: Active<br>
            > JIT Admin Access: Enabled<br>
            > ThreatLocker: Default Deny<br>
            > Blumira: Streaming Logs...
        </div>
    </div>

    <div class="dashboard-container">
        <svg viewBox="0 0 1000 700">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="red-glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feFlood flood-color="#ff3c3c" result="color"/>
                    <feComposite in="color" in2="blur" operator="in" result="glow"/>
                    <feComposite in="SourceGraphic" in2="glow" operator="over" />
                </filter>
            </defs>

            <path id="path-golden-azure" d="M 150 450 Q 200 300, 500 150" class="link-base" />
            <path id="path-trail-azure" d="M 500 450 L 500 180" class="link-base" />
            <path id="path-fruit-azure" d="M 850 450 Q 800 300, 500 150" class="link-base" />
            <path id="path-fintech-azure" d="M 850 200 L 580 140" class="link-base" />
            
            <path id="mesh-gt" d="M 230 480 L 420 480" class="link-base" />
            <path id="mesh-tf" d="M 580 480 L 770 480" class="link-base" />
            <path id="mesh-gf" d="M 230 520 Q 500 580, 770 520" class="link-base" />

            <path id="tunnel-ga" d="M 150 450 Q 200 300, 500 150" class="sdp-tunnel" />
            <path id="tunnel-ta" d="M 500 450 L 500 180" class="sdp-tunnel" />
            <path id="tunnel-fa" d="M 850 450 Q 800 300, 500 150" class="sdp-tunnel" />
            <path id="tunnel-fin" d="M 850 200 L 580 140" class="sdp-tunnel" style="stroke: var(--neon-purple); filter: none; stroke-width: 2; stroke-dasharray: 5;" />

            <path id="tunnel-mesh-gt" d="M 230 480 L 420 480" class="sdp-tunnel" style="stroke: var(--neon-gold); opacity: 0;" />
            <path id="tunnel-mesh-tf" d="M 580 480 L 770 480" class="sdp-tunnel" style="stroke: var(--neon-gold); opacity: 0;" />
            <path id="tunnel-mesh-gf" d="M 230 520 Q 500 580, 770 520" class="sdp-tunnel" style="stroke: var(--neon-gold); opacity: 0;" />

            <circle r="3" class="pulse pulse-fast" style="offset-path: path('M 150 450 Q 200 300, 500 150');" />
            <circle r="3" class="pulse pulse-med" style="offset-path: path('M 500 450 L 500 180');" />
            <circle r="3" class="pulse pulse-fast" style="offset-path: path('M 850 450 Q 800 300, 500 150');" />
            <circle r="3" class="pulse pulse-med" style="offset-path: path('M 850 200 L 580 140'); fill: var(--neon-purple);" />

            <rect x="400" y="80" width="200" height="100" class="node-rect" rx="10" />
            <text x="500" y="125" text-anchor="middle" class="label" style="font-size: 16px;">AZURE CLOUD</text>
            <text x="500" y="145" text-anchor="middle" class="status">VNET CLOAKED</text>

            <rect x="780" y="150" width="140" height="80" class="node-rect" style="stroke: var(--neon-purple);" rx="10" />
            <text x="850" y="190" text-anchor="middle" class="label">FINTECH PARTNER</text>
            <text x="850" y="210" text-anchor="middle" class="status" style="fill: var(--neon-purple);">API ACCESS ONLY</text>

            <g transform="translate(80, 450)">
                <rect x="0" y="0" width="150" height="100" class="node-rect" rx="8" />
                <text x="75" y="45" class="label">GOLDEN</text>
                <text x="75" y="70" class="status">HA GATEWAY: ACTIVE</text>
            </g>

            <g transform="translate(425, 450)">
                <rect x="0" y="0" width="150" height="100" class="node-rect" rx="8" />
                <text x="75" y="45" class="label">TRAIL</text>
                <text x="75" y="70" class="status">HA GATEWAY: ACTIVE</text>
            </g>

            <g transform="translate(770, 450)">
                <rect x="0" y="0" width="150" height="100" class="node-rect" rx="8" />
                <text x="75" y="45" class="label">FRUITVALE</text>
                <text x="75" y="70" class="status">HA GATEWAY: ACTIVE</text>
            </g>
        </svg>

        <div class="controls">
            <button onclick="reset()">Refresh Baseline</button>
            <button class="btn-chaos" onclick="triggerChaos()">Simulate Failure (Chaos Mode)</button>
        </div>
    </div>

    <script>
        function triggerChaos() {
            // Visual failure
            document.getElementById('tunnel-ta').classList.add('failed');
            document.getElementById('tunnel-ga').style.opacity = "0.2";
            
            // Update Log
            document.getElementById('mesh-status').style.borderColor = "var(--neon-red)";
            document.getElementById('mesh-status').children[0].innerHTML = "ALERT: HARDWARE FAILURE AT BRANCH";
            document.getElementById('mesh-status').children[0].style.color = "var(--neon-red)";
            
            let log = document.getElementById('log-content');
            log.innerHTML = "> SD-WAN Primary Path: LOST<br>> Latency Spike Detected<br>> Appgate Triggering Direct Route...<br>> Establishing Mesh Connectivity...";

            // Trigger Resilient Mesh
            setTimeout(() => {
                document.getElementById('tunnel-mesh-gt').style.opacity = "1";
                document.getElementById('tunnel-mesh-tf').style.opacity = "1";
                document.getElementById('tunnel-mesh-gf').style.opacity = "0.5";
                log.innerHTML += "<br>> MESH ESTABLISHED: GOLDEN <-> TRAIL <-> FRUITVALE<br>> Uptime Maintained.";
            }, 1000);
        }

        function reset() {
            location.reload();
        }
    </script>
</body>
</html>
